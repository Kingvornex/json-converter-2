name: Convert JSON

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run converters
        run: |
          python runner.py

      - name: Show generated files
        run: |
          echo "Generated files:"
          find output -type f || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: converted-json
          path: output/
          if-no-files-found: error
          compression-level: 9

      - name: Generate release information
        id: release_info
        shell: bash
        run: |
          TAG="v$(date -u +'%Y%m%d')r${{ github.run_number }}"
          DATE="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT

          {
            echo "# JSON Converter Release"
            echo
            echo "This release was automatically generated by GitHub Actions."
            echo
            echo "## Release Information"
            echo
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Tag | $TAG |"
            echo "| Workflow Run | #${{ github.run_number }} |"
            echo "| Repository | ${{ github.repository }} |"
            echo "| Branch | ${{ github.ref_name }} |"
            echo "| Commit | $SHORT_SHA |"
            echo "| Generated (UTC) | $DATE |"
            echo "| Triggered By | ${{ github.actor }} |"
            echo
            echo "## Generated Files"
            echo

            if find output -type f | grep -q .; then
              while IFS= read -r file; do
                SIZE=$(stat -c%s "$file")
                echo "- \`$file\` (${SIZE} bytes)"
              done < <(find output -type f | sort)
            else
              echo "_No files were generated._"
            fi

            echo
            echo "## Notes"
            echo
            echo "- Files in this release were generated automatically."
            echo "- JSON files are UTF-8 encoded."
            echo "- Release tag format: \`vYYYYMMDDrRUN_NUMBER\`."
            echo "- Workflow artifacts contain the same generated files."
          } > RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: Release ${{ steps.release_info.outputs.tag }}
          body_path: RELEASE.md
          generate_release_notes: true
          files: |
            output/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
