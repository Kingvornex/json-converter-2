name: Convert JSON

on:
  workflow_dispatch:

  push:
    paths:
      - "input/**"
      - "converters/**"
      - "runner.py"

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run converters
        run: |
          python runner.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: converted-json
          path: output/
